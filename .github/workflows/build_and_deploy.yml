name: build_and_deploy

on:
  push:
    branches: [ "mystmd" ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    defaults:
      run:
        shell: bash -l {0}
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v7
      with:
        ref: mystmd
    - name: Setup conda
      uses: conda-incubator/setup-miniconda@v4
      with:
        activate-environment: anaconda-client-env
    - name: Install dependencies
      run: |
        conda install -c conda-forge python kineticstoolkit jupyter mystmd sphinx sphinx-sitemap sphinxext-opengraph sphinx-book-theme -y
    - name: Build home
      run: |
        cd home
        export BASE_URL="/docs/home"
        myst build --execute --ci --html
        cd ..
    - name: Build api
      run: |
        cd api
        sphinx-build . _build/html
        cd ..
    - name: Build book
      run: |
        cd book
        export BASE_URL="/docs/book"
        myst build --execute --ci --html
        cd ..
    - name: Deploy via scp
      env:
        SCP_USER: ${{ secrets.SCP_USER }}
        SCP_HOST: ${{ secrets.SCP_HOST }}
        SCP_PORT: ${{ secrets.SCP_PORT }}
        SCP_KEY: ${{ secrets.SCP_KEY }}
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh
        echo "$SCP_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        SSH_OPTS="-o StrictHostKeyChecking=accept-new"
        scp -r $SSH_OPTS -P $SCP_PORT home/_build/html $SCP_USER@$SCP_HOST:/home/kinetics/docs_build/home
        scp -r $SSH_OPTS -P $SCP_PORT api/_build/html $SCP_USER@$SCP_HOST:/home/kinetics/docs_build/api
        scp -r $SSH_OPTS -P $SCP_PORT book/_build/html $SCP_USER@$SCP_HOST:/home/kinetics/docs_build/book
